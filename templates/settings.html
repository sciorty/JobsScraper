<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobsScraper - Settings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --text-primary: #333333;
            --text-secondary: #666666;
            --border-color: #eeeeee;
            --input-bg: #ffffff;
            --input-border: #dddddd;
        }
        
        body.dark-mode {
            --bg-primary: #1e1e1e;
            --bg-secondary: #2d2d2d;
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
            --border-color: #444444;
            --input-bg: #2d2d2d;
            --input-border: #444444;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-secondary);
            padding: 20px;
            color: var(--text-primary);
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--bg-primary);
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 30px;
        }
        h1 {
            margin-bottom: 10px;
            color: var(--text-primary);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #0084ff;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover { text-decoration: underline; }
        
        .section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        .section:last-child { border-bottom: none; }
        
        .section h2 {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 5px;
        }
        
        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--input-border);
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            background: var(--input-bg);
            color: var(--text-primary);
        }
        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus {
            outline: none;
            border-color: #0084ff;
            box-shadow: 0 0 0 3px rgba(0, 132, 255, 0.1);
        }
        
        .tag-input {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            padding: 5px;
            border: 1px solid var(--input-border);
            border-radius: 4px;
            min-height: 40px;
            align-items: flex-start;
            background: var(--input-bg);
        }
        .tag-input:focus-within { border-color: #0084ff; }
        .tag {
            background: #0084ff;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .tag button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 16px;
            padding: 0;
            line-height: 1;
        }
        .tag-input input {
            border: none;
            padding: 5px;
            flex: 1;
            min-width: 80px;
            background: transparent;
        }
        .tag-input input:focus { outline: none; }
        
        .scraper-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .scraper-item {
            display: flex;
            align-items: center;
            padding: 10px;
            background: var(--bg-secondary);
            border-radius: 4px;
            gap: 10px;
        }
        .scraper-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .scraper-item label {
            margin: 0;
            cursor: pointer;
            flex: 1;
        }
        
        .dark-mode-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }
        
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .toggle-slider {
            background-color: #0084ff;
        }
        
        input:checked + .toggle-slider:before {
            transform: translateX(26px);
        }
        
        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-save {
            background: #0084ff;
            color: white;
            flex: 1;
        }
        .btn-save:hover { background: #0073e6; }
        .btn-cancel {
            background: var(--bg-secondary);
            color: var(--text-primary);
            flex: 1;
        }
        .btn-cancel:hover { background: var(--border-color); }
        
        .message {
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Back to Dashboard</a>
        <h1>⚙️ Settings</h1>
        
        <div id="message" class="message"></div>
        
        <form id="settings-form">
            <!-- Dark Mode Toggle -->
            <div class="section">
                <h2>Appearance</h2>
                <div class="dark-mode-toggle">
                    <label for="dark-mode-toggle">Dark Mode</label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="dark-mode-toggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
            
            <!-- Keywords -->
            <div class="section">
                <h2>Keywords</h2>
                <div class="input-group">
                    <div id="keywords-tags" class="tag-input">
                        <input type="text" id="keywords-input" placeholder="Type keyword and press Enter...">
                    </div>
                </div>
            </div>
            
            <!-- Locations -->
            <div class="section">
                <h2>Locations</h2>
                <div class="input-group">
                    <div id="locations-tags" class="tag-input">
                        <input type="text" id="locations-input" placeholder="Type location and press Enter...">
                    </div>
                </div>
            </div>
            
            <!-- Polling Interval -->
            <div class="section">
                <h2>Polling Interval</h2>
                <div class="input-group">
                    <label for="poll_interval">Minutes between scrapes</label>
                    <input type="number" id="poll_interval" min="1" max="1440" value="60">
                </div>
            </div>
            
            <!-- Scrapers -->
            <div class="section">
                <h2>Scrapers</h2>
                <div id="scrapers-list" class="scraper-list"></div>
            </div>
            
            <!-- Buttons -->
            <div class="buttons">
                <button type="button" class="btn-cancel" onclick="window.location.href='/'">Cancel</button>
                <button type="submit" class="btn-save">Save Settings</button>
            </div>
        </form>
    </div>

    <script>
        let keywords = [];
        let locations = [];
        let scrapers = [];

        // Dark mode initialization
        function initDarkMode() {
            const isDark = localStorage.getItem('dark-mode') === 'true';
            if (isDark) {
                document.body.classList.add('dark-mode');
                document.getElementById('dark-mode-toggle').checked = true;
            }
        }

        // Dark mode toggle listener
        document.addEventListener('DOMContentLoaded', () => {
            initDarkMode();
            document.getElementById('dark-mode-toggle').addEventListener('change', (e) => {
                const isDark = e.target.checked;
                localStorage.setItem('dark-mode', isDark);
                if (isDark) {
                    document.body.classList.add('dark-mode');
                } else {
                    document.body.classList.remove('dark-mode');
                }
            });
        });

        // Load config on page load
        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                const data = await res.json();
                keywords = data.keywords || [];
                locations = data.locations || [];
                scrapers = data.scrapers || [];
                document.getElementById('poll_interval').value = data.poll_interval_minutes || 60;
                renderTags();
                renderScrapers();
            } catch (e) {
                showMessage('Error loading configuration', 'error');
            }
        }

        function renderTags() {
            // Keywords
            const keywordsContainer = document.getElementById('keywords-tags');
            keywordsContainer.innerHTML = keywords.map(kw => 
                `<span class="tag">${escapeHtml(kw)}<button type="button" onclick="removeKeyword('${escapeHtml(kw)}')">×</button></span>`
            ).join('') + '<input type="text" id="keywords-input" placeholder="Type keyword and press Enter...">';
            document.getElementById('keywords-input').addEventListener('keypress', e => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const val = e.target.value.trim();
                    if (val && !keywords.includes(val)) {
                        keywords.push(val);
                        renderTags();
                    }
                    e.target.value = '';
                }
            });

            // Locations
            const locationsContainer = document.getElementById('locations-tags');
            locationsContainer.innerHTML = locations.map(loc => 
                `<span class="tag">${escapeHtml(loc)}<button type="button" onclick="removeLocation('${escapeHtml(loc)}')">×</button></span>`
            ).join('') + '<input type="text" id="locations-input" placeholder="Type location and press Enter...">';
            document.getElementById('locations-input').addEventListener('keypress', e => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const val = e.target.value.trim();
                    if (val && !locations.includes(val)) {
                        locations.push(val);
                        renderTags();
                    }
                    e.target.value = '';
                }
            });
        }

        function removeKeyword(kw) {
            keywords = keywords.filter(k => k !== kw);
            renderTags();
        }

        function removeLocation(loc) {
            locations = locations.filter(l => l !== loc);
            renderTags();
        }

        function renderScrapers() {
            const list = document.getElementById('scrapers-list');
            list.innerHTML = scrapers.map((s, i) => `
                <div class="scraper-item">
                    <input type="checkbox" id="scraper-${i}" ${s.enabled ? 'checked' : ''} 
                        onchange="scrapers[${i}].enabled = this.checked">
                    <label for="scraper-${i}">${escapeHtml(s.name)}</label>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const map = {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'};
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        async function saveConfig(e) {
            e.preventDefault();
            try {
                const res = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        keywords,
                        locations,
                        poll_interval_minutes: parseInt(document.getElementById('poll_interval').value),
                        scrapers
                    })
                });
                if (res.ok) {
                    showMessage('Settings saved successfully!', 'success');
                    setTimeout(() => window.location.href = '/', 1500);
                } else {
                    showMessage('Error saving settings', 'error');
                }
            } catch (e) {
                showMessage('Error: ' + e.message, 'error');
            }
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            msg.style.display = 'block';
        }

        document.getElementById('settings-form').addEventListener('submit', saveConfig);
        loadConfig();
    </script>
</body>
</html>
